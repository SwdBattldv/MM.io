<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MooMoo Clone - Pro</title>
    <style>
        * {
            user-select: none;
            -webkit-user-select: none;
            -webkit-touch-callout: none;
            touch-action: none;
            outline: none;
        }
        
        body { margin: 0; overflow: hidden; background: #57b031; font-family: 'Arial', sans-serif; }
        canvas { display: block; }

        #topUI {
            position: absolute; top: 10px; left: 10px;
            display: flex; gap: 15px; background: rgba(0,0,0,0.5);
            padding: 8px 15px; border-radius: 20px; color: white;
            border: 2px solid rgba(255,255,255,0.2); z-index: 10; pointer-events: none;
        }

        #craftMenu {
            position: absolute; top: 10px; right: 10px;
            background: rgba(0,0,0,0.6); padding: 10px; border-radius: 10px;
            display: flex; flex-direction: column; gap: 5px; z-index: 10;
        }

        .craft-btn {
            background: #4a752c; color: white; border: 2px solid #fff;
            padding: 8px; border-radius: 5px; font-size: 12px; cursor: pointer;
        }

        #joystick-container {
            position: absolute; bottom: 50px; left: 50px;
            width: 120px; height: 120px; background: rgba(0,0,0,0.2);
            border-radius: 50%; border: 2px solid rgba(255,255,255,0.1); z-index: 10;
        }

        #joystick-stick {
            position: absolute; left: 40px; top: 40px;
            width: 40px; height: 40px; background: rgba(255,255,255,0.6); 
            border-radius: 50%; pointer-events: none;
        }
        
        .action-btns {
            position: absolute; bottom: 50px; right: 50px;
            display: flex; gap: 20px; z-index: 10;
        }

        .ctrl-btn {
            width: 80px; height: 80px; border-radius: 50%; border: none;
            color: white; font-weight: bold; font-size: 14px;
            box-shadow: 0 5px 0 #222;
        }
        #gatherBtn { background: #4caf50; }

        /* Minimap Styling */
        #minimap {
            position: absolute; bottom: 20px; right: 150px;
            width: 120px; height: 120px; background: rgba(0,0,0,0.3);
            border: 2px solid rgba(255,255,255,0.5); border-radius: 5px; z-index: 10;
        }
    </style>
</head>
<body>

<div id="topUI">
    <div>Wood: <span id="woodCount">0</span></div>
    <div>Stone: <span id="stoneCount">0</span></div>
</div>

<div id="craftMenu">
    <button class="craft-btn" onclick="craft('wall')">WALL (10W)</button>
    <button class="craft-btn" onclick="craft('spikes')">SPIKES (10S)</button>
</div>

<div id="joystick-container">
    <div id="joystick-stick"></div>
</div>

<canvas id="minimap"></canvas>

<div class="action-btns">
    <button id="gatherBtn" class="ctrl-btn">GATHER</button>
</div>

<canvas id="gameCanvas"></canvas>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const mCanvas = document.getElementById('minimap');
const mCtx = mCanvas.getContext('2d');

function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    mCanvas.width = 120;
    mCanvas.height = 120;
}
window.addEventListener('resize', resize);
resize();

// --- Game Settings ---
const worldSize = 5000; // Large World
const player = { x: 2500, y: 2500, size: 25, angle: 0, resources: { wood: 0, stone: 0 } };
const resources = [];
const structures = [];
let joystick = { active: false, id: null, moveX: 0, moveY: 0 };

// --- Init Resources (Increased Count & Variants) ---
function init() {
    for(let i=0; i<250; i++) {
        const isBig = Math.random() > 0.8;
        const type = Math.random() > 0.4 ? 'tree' : 'rock';
        const size = (type === 'tree' && isBig) ? 80 : (35 + Math.random() * 20);
        let points = [];
        if(type === 'rock') {
            for(let j=0; j<8; j++) {
                let angle = (j/8) * Math.PI * 2;
                let r = size * (0.8 + Math.random() * 0.3);
                points.push({x: Math.cos(angle) * r, y: Math.sin(angle) * r});
            }
        }
        resources.push({
            x: Math.random() * worldSize,
            y: Math.random() * worldSize,
            type: type, size: size, points: points, big: isBig
        });
    }
}

// --- Drawing Helpers ---
function drawGrid(camX, camY) {
    const gridSize = 100;
    ctx.strokeStyle = "rgba(0,0,0,0.08)";
    ctx.lineWidth = 2;
    ctx.beginPath();
    for (let x = -camX % gridSize; x < canvas.width; x += gridSize) {
        ctx.moveTo(x, 0); ctx.lineTo(x, canvas.height);
    }
    for (let y = -camY % gridSize; y < canvas.height; y += gridSize) {
        ctx.moveTo(0, y); ctx.lineTo(canvas.width, y);
    }
    ctx.stroke();
}

function drawWorldBorder(camX, camY) {
    ctx.fillStyle = "rgba(255, 0, 0, 0.15)";
    // Left
    if (camX < 0) ctx.fillRect(0, 0, -camX, canvas.height);
    // Top
    if (camY < 0) ctx.fillRect(0, 0, canvas.width, -camY);
    // Right
    if (worldSize - camX < canvas.width) ctx.fillRect(worldSize - camX, 0, canvas.width, canvas.height);
    // Bottom
    if (worldSize - camY < canvas.height) ctx.fillRect(0, worldSize - camY, canvas.width, canvas.height);
}

function drawTree(x, y, size, isBig) {
    const layers = isBig ? 4 : 3;
    const colorStep = 15;
    for(let i=0; i<layers; i++) {
        ctx.fillStyle = `rgb(${61 + i*colorStep}, ${90 + i*colorStep}, ${37 + i*colorStep})`;
        ctx.beginPath(); 
        ctx.arc(x, y, size * (1 - i*0.25), 0, Math.PI*2); 
        ctx.fill();
        ctx.strokeStyle = "rgba(0,0,0,0.1)";
        ctx.stroke();
    }
}

function drawMinimap() {
    mCtx.clearRect(0, 0, mCanvas.width, mCanvas.height);
    // Player indicator
    const px = (player.x / worldSize) * mCanvas.width;
    const py = (player.y / worldSize) * mCanvas.height;
    mCtx.fillStyle = "white";
    mCtx.beginPath();
    mCtx.arc(px, py, 4, 0, Math.PI*2);
    mCtx.fill();
}

// --- Interaction Logic ---
function craft(item) {
    if(item === 'wall' && player.resources.wood >= 10) {
        player.resources.wood -= 10;
        structures.push({x: player.x + Math.cos(player.angle)*60, y: player.y + Math.sin(player.angle)*60, color: '#8b4513'});
    } else if(item === 'spikes' && player.resources.stone >= 10) {
        player.resources.stone -= 10;
        structures.push({x: player.x + Math.cos(player.angle)*60, y: player.y + Math.sin(player.angle)*60, color: '#444'});
    }
    updateUI();
}

function updateUI() {
    document.getElementById('woodCount').innerText = player.resources.wood;
    document.getElementById('stoneCount').innerText = player.resources.stone;
}

// --- Input Handling ---
const joyContainer = document.getElementById('joystick-container');
const joyStick = document.getElementById('joystick-stick');

window.addEventListener('touchstart', (e) => {
    for(let t of e.changedTouches) {
        let rect = joyContainer.getBoundingClientRect();
        if(t.clientX > rect.left && t.clientX < rect.right && t.clientY > rect.top && t.clientY < rect.bottom) {
            joystick.active = true;
            joystick.id = t.identifier;
        }
    }
}, {passive: false});

window.addEventListener('touchmove', (e) => {
    if (!joystick.active) return;
    for(let t of e.touches) {
        if(t.identifier === joystick.id) {
            let rect = joyContainer.getBoundingClientRect();
            let centerX = rect.left + rect.width/2;
            let centerY = rect.top + rect.height/2;
            let dx = t.clientX - centerX;
            let dy = t.clientY - centerY;
            let dist = Math.min(Math.sqrt(dx*dx + dy*dy), 40);
            let angle = Math.atan2(dy, dx);
            joystick.moveX = Math.cos(angle) * (dist/40);
            joystick.moveY = Math.sin(angle) * (dist/40);
            player.angle = angle;
            joyStick.style.transform = `translate(${Math.cos(angle)*dist}px, ${Math.sin(angle)*dist}px)`;
        }
    }
}, {passive: false});

window.addEventListener('touchend', (e) => {
    for(let t of e.changedTouches) {
        if(t.identifier === joystick.id) {
            joystick.active = false; joystick.id = null;
            joystick.moveX = 0; joystick.moveY = 0;
            joyStick.style.transform = `translate(0px, 0px)`;
        }
    }
});

document.getElementById('gatherBtn').addEventListener('touchstart', (e) => {
    resources.forEach((res) => {
        if(Math.hypot(player.x - res.x, player.y - res.y) < (res.size + 40)) {
            let gain = res.big ? 5 : 2;
            if(res.type === 'tree') player.resources.wood += gain;
            else player.resources.stone += gain;
            updateUI();
        }
    });
});

// --- Main Loop ---
function loop() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    
    // Movement + World Border Constraints
    player.x = Math.max(0, Math.min(worldSize, player.x + joystick.moveX * 6));
    player.y = Math.max(0, Math.min(worldSize, player.y + joystick.moveY * 6));

    const camX = player.x - canvas.width / 2;
    const camY = player.y - canvas.height / 2;

    drawGrid(camX, camY);
    drawWorldBorder(camX, camY);

    // Render Resources (Culling: only draw if near camera)
    resources.forEach(res => {
        if(res.x > camX - 100 && res.x < camX + canvas.width + 100 &&
           res.y > camY - 100 && res.y < camY + canvas.height + 100) {
            if(res.type === 'tree') drawTree(res.x - camX, res.y - camY, res.size, res.big);
            else {
                ctx.fillStyle = '#888'; ctx.strokeStyle = '#666'; ctx.lineWidth = 3;
                ctx.beginPath();
                res.points.forEach((p, i) => {
                    if(i === 0) ctx.moveTo(res.x - camX + p.x, res.y - camY + p.y);
                    else ctx.lineTo(res.x - camX + p.x, res.y - camY + p.y);
                });
                ctx.closePath(); ctx.fill(); ctx.stroke();
            }
        }
    });

    // Draw Structures
    structures.forEach(s => {
        ctx.fillStyle = s.color;
        ctx.fillRect(s.x - camX - 15, s.y - camY - 15, 30, 30);
        ctx.strokeRect(s.x - camX - 15, s.y - camY - 15, 30, 30);
    });

    // Draw Player Center Screen
    ctx.save();
    ctx.translate(canvas.width/2, canvas.height/2);
    ctx.rotate(player.angle);
    ctx.fillStyle = '#f3e5ab'; ctx.strokeStyle = '#555'; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.arc(20, -18, 8, 0, Math.PI*2); ctx.fill(); ctx.stroke();
    ctx.beginPath(); ctx.arc(20, 18, 8, 0, Math.PI*2); ctx.fill(); ctx.stroke();
    ctx.beginPath(); ctx.arc(0, 0, player.size, 0, Math.PI*2); ctx.fill(); ctx.stroke();
    ctx.restore();

    drawMinimap();
    requestAnimationFrame(loop);
}

init();
loop();
</script>
</body>
</html>

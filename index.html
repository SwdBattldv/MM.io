<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>MooMoo Clone - World Polish</title>
    <style>
        * {
            user-select: none;
            -webkit-user-select: none;
            -webkit-touch-callout: none;
            touch-action: none;
            outline: none;
        }
        
        body { margin: 0; overflow: hidden; background: #57b031; font-family: 'Arial', sans-serif; }
        canvas { display: block; }

        #topUI {
            position: absolute; top: 10px; left: 10px;
            display: flex; gap: 15px; background: rgba(0,0,0,0.5);
            padding: 8px 15px; border-radius: 20px; color: white;
            border: 2px solid rgba(255,255,255,0.2); z-index: 10; pointer-events: none;
        }

        /* Top Right UI Container */
        #topRightUI {
            position: absolute; top: 10px; right: 10px;
            display: flex; align-items: flex-start; gap: 10px; z-index: 20;
        }

        #menuBtn {
            width: 50px; height: 50px; background: #4a752c;
            border: 3px solid white; border-radius: 10px; color: white;
            font-weight: bold; font-size: 20px; cursor: pointer;
        }

        #minimap {
            width: 100px; height: 100px; background: rgba(0,0,0,0.3);
            border: 2px solid white; border-radius: 5px;
        }

        #craftOverlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); display: none;
            justify-content: center; align-items: center; z-index: 100;
        }
        .craft-card {
            background: #333; padding: 20px; border-radius: 15px;
            display: flex; gap: 20px; border: 4px solid #555;
        }
        .item-box {
            width: 100px; height: 130px; background: #444; border-radius: 10px;
            display: flex; flex-direction: column; align-items: center;
            justify-content: space-around; color: white; font-size: 12px;
            cursor: pointer;
        }

        #joystick-container {
            position: absolute; bottom: 50px; left: 50px;
            width: 120px; height: 120px; background: rgba(0,0,0,0.2);
            border-radius: 50%; border: 2px solid rgba(255,255,255,0.1); z-index: 10;
        }
        #joystick-stick {
            position: absolute; left: 40px; top: 40px;
            width: 40px; height: 40px; background: rgba(255,255,255,0.6); 
            border-radius: 50%; pointer-events: none;
        }
        
        .action-btns {
            position: absolute; bottom: 50px; right: 50px;
            display: flex; gap: 20px; z-index: 10;
        }
        .ctrl-btn {
            width: 80px; height: 80px; border-radius: 50%; border: none;
            color: white; font-weight: bold; font-size: 14px;
            box-shadow: 0 5px 0 #222;
        }
        #gatherBtn { background: #4caf50; }
        #attackBtn { background: #f44336; }

        #vignette {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, transparent 40%, rgba(0,30,0,0.6) 100%);
            pointer-events: none; z-index: 5; opacity: 0; transition: opacity 0.5s;
        }
    </style>
</head>
<body>

<div id="vignette"></div>

<div id="topUI">
    <div>Wood: <span id="woodCount">0</span></div>
    <div>Stone: <span id="stoneCount">0</span></div>
</div>

<div id="topRightUI">
    <canvas id="minimap"></canvas>
    <button id="menuBtn">🛠</button>
</div>

<div id="craftOverlay">
    <div class="craft-card">
        <div class="item-box" onclick="craft('wall')">
            <div style="width:40px; height:40px; background:#8b4513;"></div>
            <span>WALL</span>
            <small>10 Wood</small>
        </div>
        <div class="item-box" onclick="craft('spikes')">
            <div style="width:40px; height:40px; background:#444;"></div>
            <span>SPIKES</span>
            <small>10 Stone</small>
        </div>
        <button onclick="toggleMenu()" style="padding: 10px; background:red; color:white; border:none; border-radius:5px;">CLOSE</button>
    </div>
</div>

<div id="joystick-container"><div id="joystick-stick"></div></div>
<div class="action-btns">
    <button id="gatherBtn" class="ctrl-btn">GATHER</button>
    <button id="attackBtn" class="ctrl-btn">ATTACK</button>
</div>

<canvas id="gameCanvas"></canvas>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const mCanvas = document.getElementById('minimap');
const mCtx = mCanvas.getContext('2d');
const vignette = document.getElementById('vignette');

function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    mCanvas.width = 100;
    mCanvas.height = 100;
}
window.addEventListener('resize', resize);
resize();

const worldSize = 5000;
const player = { x: 2500, y: 2500, size: 25, angle: 0, resources: { wood: 0, stone: 0 }, swing: 0, isSwinging: false };
const resources = [];
const waterBodies = [];
const grassTufts = [];
const structures = [];
let joystick = { active: false, id: null, moveX: 0, moveY: 0 };

function init() {
    // 1. Generate Non-Overlapping Water Blobs
    for(let i=0; i<10; i++) {
        let x = Math.random() * worldSize;
        let y = Math.random() * worldSize;
        let tooClose = waterBodies.some(w => Math.hypot(x-w.x, y-w.y) < 600);
        if(tooClose) { i--; continue; }

        let blobParts = [];
        let numParts = 3 + Math.floor(Math.random() * 3);
        for(let j=0; j<numParts; j++) {
            blobParts.push({
                ox: (Math.random()-0.5) * 150,
                oy: (Math.random()-0.5) * 150,
                r: 100 + Math.random() * 150
            });
        }
        waterBodies.push({ x, y, parts: blobParts });
    }

    // 2. Spread Out Resources (Decreased density)
    for(let i=0; i<250; i++) { 
        let type = Math.random() > 0.3 ? 'tree' : 'rock';
        let size = type === 'tree' ? 120 + Math.random() * 60 : 40 + Math.random() * 20;
        let x = Math.random() * worldSize;
        let y = Math.random() * worldSize;

        // Check Water Collision
        let inWater = waterBodies.some(w => w.parts.some(p => Math.hypot(x-(w.x+p.ox), y-(w.y+p.oy)) < p.r + 20));
        // Check Tree/Rock Collision (De-cluttering)
        let tooCrowded = resources.some(res => Math.hypot(x-res.x, y-res.y) < 250);
        
        if(inWater || tooCrowded) { i--; continue; }

        let points = [];
        if(type === 'rock') {
            for(let j=0; j<8; j++) {
                let r = size * (0.8 + Math.random() * 0.3);
                points.push({x: Math.cos((j/8)*Math.PI*2)*r, y: Math.sin((j/8)*Math.PI*2)*r});
            }
        }
        resources.push({x, y, type, size, points});
    }

    for(let i=0; i<600; i++) grassTufts.push({x: Math.random()*worldSize, y: Math.random()*worldSize, w: 2+Math.random()*3});
}

function toggleMenu() {
    const menu = document.getElementById('craftOverlay');
    menu.style.display = menu.style.display === 'flex' ? 'none' : 'flex';
}
document.getElementById('menuBtn').onclick = toggleMenu;

function craft(item) {
    if(item === 'wall' && player.resources.wood >= 10) {
        player.resources.wood -= 10;
        structures.push({x: player.x + Math.cos(player.angle)*60, y: player.y + Math.sin(player.angle)*60, color: '#8b4513'});
    } else if(item === 'spikes' && player.resources.stone >= 10) {
        player.resources.stone -= 10;
        structures.push({x: player.x + Math.cos(player.angle)*60, y: player.y + Math.sin(player.angle)*60, color: '#444'});
    }
    updateRes();
    toggleMenu();
}

function updateRes() {
    document.getElementById('woodCount').innerText = player.resources.wood;
    document.getElementById('stoneCount').innerText = player.resources.stone;
}

function performAction() {
    if(player.isSwinging) return;
    player.isSwinging = true; player.swing = 0;
    resources.forEach((res) => {
        if(Math.hypot(player.x - res.x, player.y - res.y) < (res.size + 40)) {
            if(res.type === 'tree') player.resources.wood += 2;
            else player.resources.stone += 2;
            updateRes();
        }
    });
}

// Controls
const joyContainer = document.getElementById('joystick-container');
const joyStick = document.getElementById('joystick-stick');

window.addEventListener('touchstart', (e) => {
    for(let t of e.changedTouches) {
        let rect = joyContainer.getBoundingClientRect();
        if(t.clientX > rect.left && t.clientX < rect.right && t.clientY > rect.top && t.clientY < rect.bottom) {
            joystick.active = true; joystick.id = t.identifier;
        }
    }
}, {passive: false});

window.addEventListener('touchmove', (e) => {
    if (!joystick.active) return;
    for(let t of e.touches) {
        if(t.identifier === joystick.id) {
            let rect = joyContainer.getBoundingClientRect();
            let dx = t.clientX - (rect.left + 60);
            let dy = t.clientY - (rect.top + 60);
            let dist = Math.min(Math.sqrt(dx*dx + dy*dy), 40);
            let angle = Math.atan2(dy, dx);
            joystick.moveX = Math.cos(angle) * (dist/40);
            joystick.moveY = Math.sin(angle) * (dist/40);
            player.angle = angle;
            joyStick.style.transform = `translate(${Math.cos(angle)*dist}px, ${Math.sin(angle)*dist}px)`;
        }
    }
}, {passive: false});

window.addEventListener('touchend', (e) => {
    for(let t of e.changedTouches) if(t.identifier === joystick.id) {
        joystick.active = false; joystick.moveX = 0; joystick.moveY = 0;
        joyStick.style.transform = `translate(0,0)`;
    }
});

document.getElementById('gatherBtn').ontouchstart = performAction;
document.getElementById('attackBtn').ontouchstart = performAction;

function drawTree(ctx, x, y, size, alpha) {
    ctx.globalAlpha = alpha;
    for(let i=0; i<5; i++) {
        ctx.fillStyle = i % 2 === 0 ? '#3d5a25' : '#4a6d2c';
        ctx.beginPath(); ctx.arc(x, y, size * (1 - i*0.15), 0, Math.PI*2); ctx.fill();
        ctx.strokeStyle = "rgba(0,0,0,0.1)"; ctx.lineWidth = 4; ctx.stroke();
    }
    ctx.globalAlpha = 1.0;
}

function loop() {
    ctx.clearRect(0,0,canvas.width, canvas.height);
    player.x = Math.max(0, Math.min(worldSize, player.x + joystick.moveX * 6));
    player.y = Math.max(0, Math.min(worldSize, player.y + joystick.moveY * 6));
    const camX = player.x - canvas.width/2;
    const camY = player.y - canvas.height/2;

    // Background
    ctx.fillStyle = "#4fa12b";
    grassTufts.forEach(t => { if(t.x > camX-20 && t.x < camX+canvas.width+20) ctx.fillRect(t.x-camX, t.y-camY, t.w, t.w); });

    // Blob Water
    ctx.fillStyle = "#4a90e2"; ctx.strokeStyle = "#357abd"; ctx.lineWidth = 8;
    waterBodies.forEach(w => {
        w.parts.forEach(p => {
            ctx.beginPath(); ctx.arc(w.x+p.ox-camX, w.y+p.oy-camY, p.r, 0, Math.PI*2); ctx.fill(); ctx.stroke();
        });
    });

    // Resources
    resources.forEach(res => {
        if(res.type === 'rock') {
            ctx.fillStyle = '#888'; ctx.beginPath();
            res.points.forEach((p,i)=> i===0?ctx.moveTo(res.x-camX+p.x, res.y-camY+p.y):ctx.lineTo(res.x-camX+p.x, res.y-camY+p.y));
            ctx.fill();
        }
    });

    structures.forEach(s => { ctx.fillStyle = s.color; ctx.fillRect(s.x-camX-15, s.y-camY-15, 30, 30); });

    // Player
    if(player.isSwinging) { player.swing += 0.2; if(player.swing >= Math.PI) player.isSwinging = false; }
    const hOff = Math.sin(player.swing) * 15;
    ctx.save(); ctx.translate(canvas.width/2, canvas.height/2); ctx.rotate(player.angle);
    ctx.fillStyle = '#f3e5ab'; ctx.strokeStyle = '#333'; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.arc(20+hOff, -18, 8, 0, Math.PI*2); ctx.fill(); ctx.stroke();
    ctx.beginPath(); ctx.arc(20+hOff, 18, 8, 0, Math.PI*2); ctx.fill(); ctx.stroke();
    ctx.beginPath(); ctx.arc(0,0,player.size,0,Math.PI*2); ctx.fill(); ctx.stroke();
    ctx.restore();

    // Canopy
    let under = false;
    resources.forEach(res => {
        if(res.type === 'tree') {
            let alpha = 1.0;
            if(Math.hypot(player.x-res.x, player.y-res.y) < res.size) { alpha = 0.4; under = true; }
            drawTree(ctx, res.x-camX, res.y-camY, res.size, alpha);
        }
    });
    vignette.style.opacity = under ? "1" : "0";

    // Minimap Rendering
    mCtx.clearRect(0,0,100,100);
    mCtx.fillStyle = "#4a90e2";
    waterBodies.forEach(w => mCtx.fillRect((w.x/worldSize)*100, (w.y/worldSize)*100, 5, 5));
    mCtx.fillStyle = "white";
    mCtx.beginPath(); mCtx.arc((player.x/worldSize)*100, (player.y/worldSize)*100, 3, 0, Math.PI*2); mCtx.fill();

    requestAnimationFrame(loop);
}
init(); loop();
</script>
</body>
</html>

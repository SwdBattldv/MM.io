<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MooMoo Clone - Deluxe</title>
    <style>
        * {
            user-select: none;
            -webkit-user-select: none;
            -webkit-touch-callout: none;
            touch-action: none;
            outline: none;
        }
        
        body { margin: 0; overflow: hidden; background: #57b031; font-family: 'Arial', sans-serif; }
        canvas { display: block; }

        /* Stats UI */
        #topUI {
            position: absolute; top: 10px; left: 10px;
            display: flex; gap: 15px; background: rgba(0,0,0,0.5);
            padding: 8px 15px; border-radius: 20px; color: white;
            border: 2px solid rgba(255,255,255,0.2); z-index: 10; pointer-events: none;
        }

        /* Crafting Menu Toggle */
        #menuBtn {
            position: absolute; top: 10px; right: 10px;
            width: 50px; height: 50px; background: #4a752c;
            border: 3px solid white; border-radius: 10px; color: white;
            font-weight: bold; font-size: 20px; cursor: pointer; z-index: 20;
        }

        /* Full Screen Crafting Overlay */
        #craftOverlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); display: none;
            justify-content: center; align-items: center; z-index: 100;
        }
        .craft-card {
            background: #333; padding: 20px; border-radius: 15px;
            display: flex; gap: 20px; border: 4px solid #555;
        }
        .item-box {
            width: 100px; height: 130px; background: #444; border-radius: 10px;
            display: flex; flex-direction: column; align-items: center;
            justify-content: space-around; color: white; font-size: 12px;
            border: 2px solid transparent; cursor: pointer;
        }
        .item-box:hover { border-color: #57b031; }

        /* Controls */
        #joystick-container {
            position: absolute; bottom: 50px; left: 50px;
            width: 120px; height: 120px; background: rgba(0,0,0,0.2);
            border-radius: 50%; border: 2px solid rgba(255,255,255,0.1); z-index: 10;
        }
        #joystick-stick {
            position: absolute; left: 40px; top: 40px;
            width: 40px; height: 40px; background: rgba(255,255,255,0.6); 
            border-radius: 50%; pointer-events: none;
        }
        .action-btns {
            position: absolute; bottom: 50px; right: 50px;
            display: flex; gap: 20px; z-index: 10;
        }
        .ctrl-btn {
            width: 80px; height: 80px; border-radius: 50%; border: none;
            color: white; font-weight: bold; font-size: 14px;
            box-shadow: 0 5px 0 #222;
        }
        #gatherBtn { background: #4caf50; }
        #attackBtn { background: #f44336; }
        #minimap {
            position: absolute; bottom: 20px; right: 250px;
            width: 100px; height: 100px; background: rgba(0,0,0,0.3);
            border: 2px solid white; border-radius: 5px; z-index: 10;
        }
    </style>
</head>
<body>

<div id="topUI">
    <div>Wood: <span id="woodCount">0</span></div>
    <div>Stone: <span id="stoneCount">0</span></div>
</div>

<button id="menuBtn">🛠</button>

<div id="craftOverlay">
    <div class="craft-card">
        <div class="item-box" onclick="craft('wall')">
            <div style="width:40px; height:40px; background:#8b4513;"></div>
            <span>WALL</span>
            <small>10 Wood</small>
        </div>
        <div class="item-box" onclick="craft('spikes')">
            <div style="width:40px; height:40px; background:#444;"></div>
            <span>SPIKES</span>
            <small>10 Stone</small>
        </div>
        <button onclick="toggleMenu()" style="padding: 10px; background:red; color:white; border:none; border-radius:5px;">CLOSE</button>
    </div>
</div>

<div id="joystick-container"><div id="joystick-stick"></div></div>
<canvas id="minimap"></canvas>
<div class="action-btns">
    <button id="gatherBtn" class="ctrl-btn">GATHER</button>
    <button id="attackBtn" class="ctrl-btn">ATTACK</button>
</div>

<canvas id="gameCanvas"></canvas>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const mCanvas = document.getElementById('minimap');
const mCtx = mCanvas.getContext('2d');

function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    mCanvas.width = 100; mCanvas.height = 100;
}
window.addEventListener('resize', resize);
resize();

// --- Game State ---
const worldSize = 5000;
const player = { 
    x: 2500, y: 2500, size: 25, angle: 0, 
    resources: { wood: 0, stone: 0 },
    swing: 0, isSwinging: false 
};
const resources = [];
const structures = [];
let joystick = { active: false, id: null, moveX: 0, moveY: 0 };

// --- Spawn logic ---
function init() {
    for(let i=0; i<400; i++) { // More trees
        const rand = Math.random();
        let type = rand > 0.3 ? 'tree' : 'rock';
        let variant = Math.random();
        let size = 35 + Math.random() * 20;
        let color = '#3d5a25';
        
        if(type === 'tree') {
            if(variant > 0.8) { size = 90; color = '#2d451d'; } // Giant Oak
            else if(variant > 0.6) { size = 30; color = '#5a8236'; } // Small Bush
        }

        let points = [];
        if(type === 'rock') {
            for(let j=0; j<8; j++) {
                let r = size * (0.8 + Math.random() * 0.3);
                points.push({x: Math.cos((j/8)*Math.PI*2)*r, y: Math.sin((j/8)*Math.PI*2)*r});
            }
        }
        resources.push({x: Math.random()*worldSize, y: Math.random()*worldSize, type, size, points, color});
    }
}

// --- Menu Logic ---
function toggleMenu() {
    const menu = document.getElementById('craftOverlay');
    menu.style.display = menu.style.display === 'flex' ? 'none' : 'flex';
}
document.getElementById('menuBtn').onclick = toggleMenu;

function craft(item) {
    if(item === 'wall' && player.resources.wood >= 10) {
        player.resources.wood -= 10;
        structures.push({x: player.x + Math.cos(player.angle)*60, y: player.y + Math.sin(player.angle)*60, color: '#8b4513'});
    } else if(item === 'spikes' && player.resources.stone >= 10) {
        player.resources.stone -= 10;
        structures.push({x: player.x + Math.cos(player.angle)*60, y: player.y + Math.sin(player.angle)*60, color: '#444'});
    }
    updateUI();
    toggleMenu();
}

function updateUI() {
    document.getElementById('woodCount').innerText = player.resources.wood;
    document.getElementById('stoneCount').innerText = player.resources.stone;
}

// --- Animations & Actions ---
function performAction() {
    if(player.isSwinging) return;
    player.isSwinging = true;
    player.swing = 0;

    resources.forEach((res) => {
        if(Math.hypot(player.x - res.x, player.y - res.y) < (res.size + 50)) {
            if(res.type === 'tree') player.resources.wood += (res.size > 70 ? 5 : 2);
            else player.resources.stone += 2;
            updateUI();
        }
    });
}

// --- Touch Fix ---
const joyContainer = document.getElementById('joystick-container');
const joyStick = document.getElementById('joystick-stick');

window.addEventListener('touchstart', (e) => {
    for(let t of e.changedTouches) {
        let rect = joyContainer.getBoundingClientRect();
        if(t.clientX > rect.left && t.clientX < rect.right && t.clientY > rect.top && t.clientY < rect.bottom) {
            joystick.active = true; joystick.id = t.identifier;
        }
    }
});

window.addEventListener('touchmove', (e) => {
    if (!joystick.active) return;
    for(let t of e.touches) {
        if(t.identifier === joystick.id) {
            let rect = joyContainer.getBoundingClientRect();
            let dx = t.clientX - (rect.left + 60);
            let dy = t.clientY - (rect.top + 60);
            let dist = Math.min(Math.sqrt(dx*dx + dy*dy), 40);
            let angle = Math.atan2(dy, dx);
            joystick.moveX = Math.cos(angle) * (dist/40);
            joystick.moveY = Math.sin(angle) * (dist/40);
            player.angle = angle;
            joyStick.style.transform = `translate(${Math.cos(angle)*dist}px, ${Math.sin(angle)*dist}px)`;
        }
    }
});

window.addEventListener('touchend', (e) => {
    for(let t of e.changedTouches) if(t.identifier === joystick.id) {
        joystick.active = false; joystick.moveX = 0; joystick.moveY = 0;
        joyStick.style.transform = `translate(0,0)`;
    }
});

document.getElementById('gatherBtn').ontouchstart = performAction;
document.getElementById('attackBtn').ontouchstart = performAction;

// --- Main Loop ---
function loop() {
    ctx.clearRect(0,0,canvas.width, canvas.height);
    player.x = Math.max(0, Math.min(worldSize, player.x + joystick.moveX * 6));
    player.y = Math.max(0, Math.min(worldSize, player.y + joystick.moveY * 6));
    const camX = player.x - canvas.width/2;
    const camY = player.y - canvas.height/2;

    // Grid & Border
    ctx.strokeStyle = "rgba(0,0,0,0.05)"; ctx.beginPath();
    for(let x=-camX%100; x<canvas.width; x+=100){ctx.moveTo(x,0); ctx.lineTo(x,canvas.height);}
    for(let y=-camY%100; y<canvas.height; y+=100){ctx.moveTo(0,y); ctx.lineTo(canvas.width,y);}
    ctx.stroke();

    // Resources
    resources.forEach(res => {
        if(res.x > camX-100 && res.x < camX+canvas.width+100 && res.y > camY-100 && res.y < camY+canvas.height+100) {
            if(res.type === 'tree') {
                for(let i=0; i<3; i++) {
                    ctx.fillStyle = res.color; ctx.beginPath();
                    ctx.arc(res.x-camX, res.y-camY, res.size*(1-i*0.3), 0, Math.PI*2); ctx.fill();
                }
            } else {
                ctx.fillStyle = '#888'; ctx.beginPath();
                res.points.forEach((p,i)=> i===0?ctx.moveTo(res.x-camX+p.x, res.y-camY+p.y):ctx.lineTo(res.x-camX+p.x, res.y-camY+p.y));
                ctx.fill();
            }
        }
    });

    // Structures
    structures.forEach(s => {
        ctx.fillStyle = s.color; ctx.fillRect(s.x-camX-15, s.y-camY-15, 30, 30);
    });

    // Player with Hand Animation
    if(player.isSwinging) {
        player.swing += 0.2;
        if(player.swing >= Math.PI) { player.isSwinging = false; player.swing = 0; }
    }
    const handOffset = Math.sin(player.swing) * 15;

    ctx.save();
    ctx.translate(canvas.width/2, canvas.height/2);
    ctx.rotate(player.angle);
    ctx.fillStyle = '#f3e5ab'; ctx.strokeStyle = '#333'; ctx.lineWidth = 2;
    // Hands
    ctx.beginPath(); ctx.arc(20 + handOffset, -18, 8, 0, Math.PI*2); ctx.fill(); ctx.stroke();
    ctx.beginPath(); ctx.arc(20 + handOffset, 18, 8, 0, Math.PI*2); ctx.fill(); ctx.stroke();
    // Body
    ctx.beginPath(); ctx.arc(0, 0, player.size, 0, Math.PI*2); ctx.fill(); ctx.stroke();
    ctx.restore();

    // Minimap
    mCtx.clearRect(0,0,100,100); mCtx.fillStyle="white";
    mCtx.beginPath(); mCtx.arc((player.x/worldSize)*100, (player.y/worldSize)*100, 3, 0, Math.PI*2); mCtx.fill();

    requestAnimationFrame(loop);
}
init(); loop();
</script>
</body>
</html>
